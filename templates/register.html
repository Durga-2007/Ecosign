<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up — Lavender Theme</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        :root {
            --lavender: #d8b4e2;
            --lavender-light: #f2e6f8;
            --text-dark: #333;
            --white: #fff;
        }

        html,
        body {
            height: 100%;
            background: var(--lavender-light);
            font-family: "Poppins", sans-serif;
            color: var(--text-dark);
        }

        .split {
            min-height: 100vh;
        }

        .left {
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .right {
            background: var(--lavender);
            color: #3b214b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            text-align: center;
        }

        .brand-title {
            font-weight: 800;
            font-size: 2.2rem;
            color: #4a2365;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #ccc;
            padding: 12px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--lavender);
        }

        .btn-lavender {
            background: #b67dd8;
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 10px;
        }

        .btn-lavender:hover {
            background: #9f67c6;
        }

        .alert-custom {
            display: none;
        }

        .quote {
            font-size: 1.2rem;
            font-weight: 600;
            max-width: 450px;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .split {
                flex-direction: column;
            }

            .left,
            .right {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row g-0 split">

            <!-- Left: Sign Up -->
            <div class="col-md-6 left">
                <div style="width:100%; max-width:400px;">
                    <div class="text-center mb-4">
                        <div class="brand-title">SIGN UP</div>
                        <p class="text-muted">Create your account to start using EcoSign</p>
                    </div>

                    <div id="alertMsg" class="alert alert-danger alert-custom" role="alert"></div>

                    <form id="regForm">
                        <div class="mb-3">
                            <input id="email" name="email" type="email" class="form-control"
                                placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <input id="username" name="username" type="text" class="form-control"
                                placeholder="Choose a username" required>
                        </div>
                        <div class="mb-3">
                            <input id="password" name="password" type="password" class="form-control"
                                placeholder="Create a password" required>
                        </div>
                        <div class="d-grid mb-3">
                            <button id="btnRegister" class="btn btn-lavender" type="submit">Register</button>
                        </div>
                        <div class="text-center">
                            <span class="text-muted">Already have an account?</span>
                            <a href="/login_view" class="text-decoration-none"
                                style="color: #4a2365; font-weight: 600;">Sign In</a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right: Quote -->
            <div class="col-md-6 right">
                <div class="quote">
                    “Join our community.<br>
                    Breaking barriers with every sign.”
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Check if user is already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = '/dashboard';
        }

        const alertEl = document.getElementById('alertMsg');
        const form = document.getElementById('regForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertEl.style.display = 'none';

            const formData = new FormData(form);

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    // One-time registration stores credentials locally for persistency
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', formData.get('username'));
                    window.location.href = '/dashboard';
                } else {
                    alertEl.innerText = data.error || 'Registration failed.';
                    alertEl.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                alertEl.innerText = 'Something went wrong. Please try again.';
                alertEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
