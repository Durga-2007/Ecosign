<!DOCTYPE html>
<html>

<head>
    <title>AI Assistant Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-white" href="/dashboard">Sign ML</a>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 600px;">
        <h2 class="text-center mb-4" style="color: #5f2ea8;">AI Assistant</h2>

        <div id="chat-box" class="chat-container">
            <div class="chat-bubble assistant">
                Hello. How can I help you today?
            </div>
        </div>

        <div class="mb-3 d-flex align-items-center">
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="signMode">
                <label class="form-check-label ms-2" for="signMode">Sign Language Mode</label>
            </div>
        </div>

        <div id="video-container" style="display: none; margin-bottom: 15px;">
            <div class="video-box" style="height: 200px;">
                <img id="videoFeed" src="" style="width: 100%; height: 100%; object-fit: cover; border-radius: 15px;">
            </div>
        </div>

        <div class="chat-input-group">
            <input type="text" id="userInput" class="chat-input" placeholder="Type your message..."
                onkeypress="if(event.key === 'Enter') handleSend()">
            <button class="btn-send" onclick="handleSend()">Send</button>
        </div>

        <div class="text-center mt-4">
            <a href="/dashboard" class="btn btn-grey">Back to Dashboard</a>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');
        const signMode = document.getElementById('signMode');
        const videoContainer = document.getElementById('video-container');
        const videoFeed = document.getElementById('videoFeed');
        let pollInterval;

        function appendMessage(message, type) {
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.flexDirection = 'column';
            wrapper.style.alignItems = type === 'user' ? 'flex-end' : 'flex-start';
            wrapper.style.marginBottom = '10px';

            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${type}`;
            bubble.innerText = message;
            wrapper.appendChild(bubble);

            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function processMessage(message) {
            if (!message) return;
            appendMessage(message, 'user');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        is_sign: signMode.checked
                    })
                });
                const data = await response.json();
                appendMessage(data.response, 'assistant');
            } catch (error) {
                console.error('Error:', error);
                appendMessage('Sorry, something went wrong. Please try again.', 'assistant');
            }
        }


        function handleSend() {
            const message = userInput.value.trim();
            if (message) {
                processMessage(message);
                userInput.value = '';
            }
        }

        signMode.addEventListener('change', () => {
            if (signMode.checked) {
                videoContainer.style.display = 'block';
                videoFeed.src = "/video_feed/text/en";
                startPolling();
            } else {
                videoContainer.style.display = 'none';
                videoFeed.src = "";
                stopPolling();
            }
        });

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch('/api/latest_sign');
                    const data = await res.json();
                    if (data.sign !== "No Sign") {
                        processMessage(data.sign);
                    }
                } catch (e) {
                    console.error("Polling error:", e);
                }
            }, 1000);
        }

        function stopPolling() {
            if (pollInterval) clearInterval(pollInterval);
        }

    </script>


</body>

</html>
