<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Learning — ECOSIGN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --lavender: #d8b4e2;
            --deep-purple: #4a2365;
            --glass: rgba(255, 255, 255, 0.2);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            background: linear-gradient(135deg, #f2e6f8 0%, #d8b4e2 100%);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--deep-purple);
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            font-weight: 400;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        .sign-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .sign-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(74, 35, 101, 0.15);
            background: rgba(255, 255, 255, 0.6);
            border-color: var(--lavender);
        }

        .img-container {
            width: 100%;
            height: 200px;
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.6s ease;
        }

        .sign-card:hover img {
            transform: scale(1.1);
        }

        .sign-name {
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: capitalize;
            margin-top: 10px;
            display: block;
        }

        .back-btn {
            margin-top: 60px;
            padding: 12px 30px;
            background: var(--deep-purple);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(74, 35, 101, 0.2);
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(74, 35, 101, 0.3);
        }

        /* Modal Overlay */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
            animation: slideIn 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes slideIn {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #ccc;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: var(--deep-purple);
        }

        .modal-img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>✨ Avatar Learning</h1>
        <p class="subtitle">Interactive guide to master sign language gestures</p>
    </div>

    <!-- 🌐 Search Section -->
    <div style="width: 100%; max-width: 600px; margin-bottom: 40px;">
        <div style="position: relative; display: flex; gap: 10px;">
            <input type="text" id="searchInput" placeholder="Type a sign (e.g., Hello, Stop, Yes...)"
                style="flex: 1; padding: 15px 25px; border-radius: 50px; border: 2px solid white; background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); font-family: 'Outfit', sans-serif; font-size: 1.1rem; color: var(--deep-purple); outline: none; transition: var(--transition);">
            <button onclick="searchSign()"
                style="padding: 0 30px; border-radius: 50px; border: none; background: var(--deep-purple); color: white; font-weight: 600; cursor: pointer; transition: var(--transition);">Search</button>
        </div>
        <p id="searchFeedback" style="margin-top: 10px; font-size: 0.9rem; opacity: 0.8; height: 20px;"></p>
    </div>

    <div class="grid">
        <div class="sign-card" onclick="openModal('Hello', '/static/signs/hello.png')">
            <div class="img-container">
                <img src="/static/signs/hello.png" alt="Hello">
            </div>
            <span class="sign-name">Hello</span>
        </div>

        <div class="sign-card" onclick="openModal('Thanks', '/static/signs/thanks.png')">
            <div class="img-container">
                <img src="/static/signs/thanks.png" alt="Thanks">
            </div>
            <span class="sign-name">Thanks</span>
        </div>

        <div class="sign-card" onclick="openModal('Stop', '/static/signs/stop.png')">
            <div class="img-container">
                <img src="/static/signs/stop.png" alt="Stop">
            </div>
            <span class="sign-name">Stop</span>
        </div>

        <div class="sign-card" onclick="openModal('Yes', '/static/signs/yes.png')">
            <div class="img-container">
                <img src="/static/signs/yes.png" alt="Yes">
            </div>
            <span class="sign-name">Yes</span>
        </div>

        <div class="sign-card" onclick="openModal('No', '/static/signs/no.png')">
            <div class="img-container">
                <img src="/static/signs/no.png" alt="No">
            </div>
            <span class="sign-name">No</span>
        </div>

        <div class="sign-card" onclick="openModal('Emergency', '/static/signs/emergency.png')">
            <div class="img-container">
                <img src="/static/signs/emergency.png" alt="Emergency">
            </div>
            <span class="sign-name">Emergency</span>
        </div>

        <div class="sign-card" onclick="openModal('Please', '/static/signs/please.png')">
            <div class="img-container">
                <img src="/static/signs/please.png" alt="Please">
            </div>
            <span class="sign-name">Please</span>
        </div>

        <div class="sign-card" onclick="openModal('Wait', '/static/signs/wait.png')">
            <div class="img-container">
                <img src="/static/signs/wait.png" alt="Wait">
            </div>
            <span class="sign-name">Wait</span>
        </div>

        <div class="sign-card" onclick="openModal('Come', '/static/signs/come.png')">
            <div class="img-container">
                <img src="/static/signs/come.png" alt="Come">
            </div>
            <span class="sign-name">Come</span>
        </div>
    </div>

    <a href="/dashboard" class="back-btn">Back to Dashboard</a>

    <!-- Modal for Zoomed Sign -->
    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="margin-top:0; font-weight:800;">Sign Name</h2>
            <img id="modal-img" class="modal-img" src="" alt="Sign">
            <p>Practice this gesture in the <a href="/sign_to_text"
                    style="color:var(--deep-purple); font-weight:600;">Live Detection</a> mode!</p>
        </div>
    </div>

    <script>
        const signData = {
            "hello": "/static/signs/hello.png",
            "thanks": "/static/signs/thanks.png",
            "stop": "/static/signs/stop.png",
            "yes": "/static/signs/yes.png",
            "no": "/static/signs/no.png",
            "emergency": "/static/signs/emergency.png",
            "please": "/static/signs/please.png",
            "wait": "/static/signs/wait.png",
            "come": "/static/signs/come.png"
        };

        function openModal(name, src) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function searchSign() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const feedback = document.getElementById('searchFeedback');

            if (!query) {
                feedback.innerText = "Please type a word first!";
                feedback.style.color = "red";
                return;
            }

            if (signData[query]) {
                feedback.innerText = `Found "${query}"!`;
                feedback.style.color = "green";
                openModal(query.toUpperCase(), signData[query]);
            } else {
                feedback.innerText = `Sorry, "${query}" is not in our learning library yet.`;
                feedback.style.color = "red";
            }
        }

        // Handle Enter key
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchSign();
            }
        });
    </script>

</body>

</html>
