<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — Lavender Theme</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    :root {
      --lavender: #d8b4e2;
      --lavender-light: #f2e6f8;
      --text-dark: #333;
      --white: #fff;
    }

    html, body {
      height: 100%;
      background: var(--lavender-light);
      font-family: "Poppins", sans-serif;
      color: var(--text-dark);
    }

    .split {
      min-height: 100vh;
    }

    .left {
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .right {
      background: var(--lavender);
      color: #3b214b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      text-align: center;
    }

    .brand-title {
      font-weight: 800;
      font-size: 2.2rem;
      color: #4a2365;
    }

    .google-btn {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      background: var(--white);
      color: #333;
      width: 100%;
      font-weight: 500;
    }

    .form-control {
      border-radius: 8px;
      border: 1px solid #ccc;
      padding: 12px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: var(--lavender);
    }

    .btn-lavender {
      background: #b67dd8;
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 10px;
    }

    .btn-lavender:hover {
      background: #9f67c6;
    }

    .alert-invalid {
      display: none;
    }

    .quote {
      font-size: 1.2rem;
      font-weight: 600;
      max-width: 450px;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .split {
        flex-direction: column;
      }
      .left, .right {
        padding: 2rem;
      }
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row g-0 split">
      
      <!-- Left: Sign In -->
      <div class="col-md-6 left">
        <div style="width:100%; max-width:400px;">
          <div class="text-center mb-4">
            <div class="brand-title">SIGN IN</div>
          </div>

          <button id="btn-google" class="google-btn mb-3">Continue with Google</button>
          <div class="text-center text-muted mb-3">or</div>

          <div id="alertInvalid" class="alert alert-danger alert-invalid" role="alert">
            Incorrect username or password.
          </div>

          <!-- ✅ Real Flask-connected login form -->
          <form id="signForm">
            <div class="mb-3">
              <input id="username" name="username" type="text" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="mb-2">
              <input id="password" name="password" type="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <div class="text-end mb-3">
              <a href="#" class="text-decoration-underline text-muted">Forgot password?</a>
            </div>
            <div class="d-grid">
              <button id="btnLogin" class="btn btn-lavender" type="submit">Sign In</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Right: Quote -->
      <div class="col-md-6 right">
        <div class="quote">
          “Speak without words.<br>
          Let your actions and your success speak for you.”
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ✅ Real Flask integration -->
  <script>
    const alertEl = document.getElementById('alertInvalid');
    const form = document.getElementById('signForm');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';

      const formData = new FormData(form);

      try {
        const response = await fetch('/login', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();

        if (data.success) {
          window.location.href = '/dashboard';
        } else {
          alertEl.style.display = 'block';
        }
      } catch (error) {
        console.error('Error:', error);
        alertEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
